<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        
        <title>GOOB</title>
        <link rel="icon" type="image/png" href="icons/goober.png">
        
        <meta property="og:title" content="GOOB">
        <meta property="og:type" content="website">
        <meta property="og:description" content="Tools for Goober Dash by Winterpixel Games&#10;Work in progress, not mobile-friendly">
    </head>
    
    <body>
        <div class="background"></div>
        <div id="app">
            <div id="sceneRow">
                <div id="scenePlayers" class="horizontal scene">
                    <div id="scenePlayersLeft" class="vertical splitLeft panel">
                        <label for="uuidOrUsername">UUID or Username</label>
                        <input id="uuidOrUsername" class="longWidth" type="text" value="00000000-0000-0000-0000-000000000001">
                        <button id="searchPlayer" class="longWidth">Search</button>
                        <div id="playerSearch" class="panel">
                            <span>Results</span>
                        </div>
                    </div>
                    
                    <div id="scenePlayersRight" class="vertical splitRight panel">
                        <div class="horizontal splitTop panel">
                            <div class="textRight playerInfo vertical">
                                <span>Username:</span>
                                <span class="smallFont">UUID / User ID:</span>
                                <span>Level:</span>
                                <span class="smallFont">Create Time:</span>
                                <span class="smallFont">Last Seen:</span>
                                <span>Current Winstreak:</span>
                                <span>Highest Winstreak:</span>
                                <span>Games:</span>
                                <span>Wins:</span>
                                <span>Winrate:</span>
                                <span>Deaths:</span>
                                <span>Deathrate:</span>
                            </div>
                            
                            <div class="textLeft playerInfo vertical">
                                <span id="playerUsername">asdf</span>
                                <span id="playerUuid" class="smallFont">asdf</span>
                                <span id="playerLevel">asdf</span>
                                <span id="playerCreateTime" class="smallFont">asdf</span>
                                <span id="playerLastSeen" class="smallFont">asdf</span>
                                <span id="playerCurrentWinstreak">asdf</span>
                                <span id="playerHighestWinstreak">asdf</span>
                                <span id="playerGames">asdf</span>
                                <span id="playerWins">asdf</span>
                                <span id="playerWinrate">asdf</span>
                                <span id="playerDeaths">asdf</span>
                                <span id="playerDeathrate">asdf</span>
                            </div>
                            
                            <img class="goober" src="placeholder.png">
                        </div>
                        
                        <div class="awardGridContainer splitBottom panel vertical">
                            <span>Awards / Badges / Medals</span>
                            <div id="awardsGrid">
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                                <div class="award"><img src="awards/betatester.png"><span>x10</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div id="sceneLevels" class="scene">
                    sceneLevels
                </div>
                
                <div id="sceneCrowns" class="scene">
                    sceneCrowns
                </div>
            </div>
            
            <div id="sceneButtons">
                <button id="sceneButtonPlayers">Players</button>
                <button id="sceneButtonLevels">Levels</button>
                <button id="sceneButtonCrowns">Crowns</button>
            </div>
        </div>
        <script src="scenes.js"></script>
        <script type="module" src="players.js"></script>
        <!-- <script type="module" src="levels.js"></script> -->
        <!-- <script type="module" src="crowns.js"></script> -->
    </body>
</html>
